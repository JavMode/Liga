<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga de Fútbol</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f9f9; --surface: #fff; --border: #e0e0e0;
    --accent: #111; --muted: #888; --green: #2ecc71; --red: #e74c3c;
    --yellow: #f1c40f; --radius: 8px;
  }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--accent); min-height: 100vh; padding: 2rem 1rem; }
  h1 { text-align: center; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.3rem; }
  .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }

  .config { max-width: 500px; margin: 0 auto 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; }
  .config h2 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }
  .field { margin-bottom: 0.8rem; }
  .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; }
  .field input { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 0.8rem; font-size: 0.85rem; outline: none; }
  .field input:focus { border-color: var(--accent); }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  button { border: 1px solid var(--accent); background: var(--accent); color: #fff; padding: 0.5rem 1.1rem; border-radius: var(--radius); font-size: 0.85rem; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  button:hover { opacity: 0.8; }
  button.secondary { background: transparent; color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .sync-bar { display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; color: var(--muted); justify-content: center; margin-bottom: 1.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--green); }
  .dot.err { background: var(--red); }
  .dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .sections { display: flex; flex-direction: column; gap: 2rem; max-width: 900px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; }
  .card h2 { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }
  .groups { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media(max-width:600px){ .groups { grid-template-columns: 1fr; } }
  .group-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .group-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 0.3rem 0.4rem; border-bottom: 1px solid var(--border); }
  .group-table td { padding: 0.35rem 0.4rem; border-bottom: 1px solid var(--border); }
  .group-table tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
  .badge.q { background: #111; color: #fff; }
  .badge.lower { background: var(--yellow); color: #111; }
  .matches { display: flex; flex-direction: column; gap: 0.6rem; }
  .match { display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
  .match:last-child { border-bottom: none; }
  .match .teams { flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
  .match .team { flex: 1; }
  .match .team.right { text-align: right; }
  .match .vs { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }
  .score-inputs { display: flex; align-items: center; gap: 4px; }
  .score-inputs input { width: 36px; text-align: center; border: 1px solid var(--border); border-radius: 4px; padding: 0.25rem; font-size: 0.85rem; outline: none; }
  .score-inputs input:focus { border-color: var(--accent); }
  .save-btn { font-size: 0.75rem; padding: 0.2rem 0.6rem; }
  .round-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.8rem; margin-bottom: 0.3rem; }
  #notice { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--accent); color: #fff; padding: 0.6rem 1rem; border-radius: var(--radius); font-size: 0.8rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>⚽ Liga de Fútbol</h1>
<p class="subtitle">Fixture de 8 jugadores — Grupos + Upper/Lower Bracket</p>



<div class="sync-bar" id="syncBar" style="display:none">
  <span class="dot" id="syncDot"></span>
  <span id="syncMsg">—</span>
  <button class="secondary" onclick="syncScores()" style="padding:0.2rem 0.6rem;font-size:0.75rem">↻ Actualizar</button>
</div>

<div id="notice">Cargando liga...</div>
<div class="sections" id="app" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
const PLAYERS_ID = '69bc9cafc3097a1dd53f9936';
const SCORES_ID  = '69bc9cc7aa77b81da9feb60d';

let players = [], groupMatches = {A:[],B:[]}, scores = {}, standings = {A:[],B:[]};
let brackets = {}, scoresId = SCORES_ID, syncInterval = null;

// ── jsonb.io helpers ───────────────────────────────────────────────────────────
async function jsonbGet(id) {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function jsonbSet(id, data) {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Load ───────────────────────────────────────────────────────────────────────
async function loadAll() {
  setSyncState('loading', 'Cargando...');
  try {
    const data = await jsonbGet(PLAYERS_ID);
    const list = Array.isArray(data) ? data : (data.players || Object.values(data));
    if (!list || list.length < 8) throw new Error('Se necesitan 8 jugadores en el bin');
    players = list.slice(0,8).map(p => typeof p === 'string' ? p : (p.name || p.nombre || String(p)));
    scoresId = SCORES_ID;

    let saved = {};
    try { saved = await jsonbGet(sid); } catch(e) { /* bin vacío, ok */ }
    scores = (saved && typeof saved === 'object' && !Array.isArray(saved)) ? saved : {};

    init();
    startAutoSync();
    setSyncState('ok', 'Sincronizado');
  } catch(e) {
    setSyncState('err', 'Error: ' + e.message);
  }
}

function loadDemo() {
  players = ['Messi','Mbappé','Haaland','Vinicius','Benzema','Neymar','Lewandowski','Salah'];
  scoresId = null;
  scores = {};
  stopAutoSync();
  document.getElementById('syncBar').style.display = 'none';
  init();
  toast('Modo demo — los scores no se guardan');
}

// ── Sync ───────────────────────────────────────────────────────────────────────
function startAutoSync() {
  stopAutoSync();
  syncInterval = setInterval(syncScores, 15000);
}
function stopAutoSync() {
  if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
}

async function syncScores() {
  if (!scoresId) return;
  setSyncState('loading', 'Sincronizando...');
  try {
    const saved = await jsonbGet(scoresId);
    if (saved && typeof saved === 'object' && !Array.isArray(saved)) {
      scores = saved;
      recalcStandings();
      render();
    }
    setSyncState('ok', 'Sincronizado · ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSyncState('err', 'Sin conexión');
  }
}

async function saveScore(id) {
  const hEl = document.getElementById(`h_${id}`), aEl = document.getElementById(`a_${id}`);
  const h = parseInt(hEl.value), a = parseInt(aEl.value);
  if (isNaN(h) || isNaN(a)) return toast('Ingresá ambos scores', true);
  scores[id] = { h, a };
  recalcStandings();
  render();

  if (!scoresId) return;
  setSyncState('loading', 'Guardando...');
  try {
    await jsonbSet(scoresId, scores);
    setSyncState('ok', 'Guardado · ' + new Date().toLocaleTimeString());
    toast('Score guardado ✓');
  } catch(e) {
    setSyncState('err', 'Error al guardar');
    toast('Error al guardar', true);
  }
}

function setSyncState(state, msg) {
  const bar = document.getElementById('syncBar');
  bar.style.display = 'flex';
  document.getElementById('syncDot').className = 'dot ' + state;
  document.getElementById('syncMsg').textContent = msg;
}

// ── Init ───────────────────────────────────────────────────────────────────────
function init() {
  const [a1,a2,a3,a4,b1,b2,b3,b4] = players;
  groupMatches.A = makeRR([a1,a2,a3,a4], 'A');
  groupMatches.B = makeRR([b1,b2,b3,b4], 'B');
  standings.A = [a1,a2,a3,a4].map(p => ({name:p,pts:0,gf:0,ga:0}));
  standings.B = [b1,b2,b3,b4].map(p => ({name:p,pts:0,gf:0,ga:0}));
  recalcStandings();
  document.getElementById('notice').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
}

function makeRR(grp, pfx) {
  const m = [];
  for (let i=0;i<grp.length;i++)
    for (let j=i+1;j<grp.length;j++)
      m.push({id:`${pfx}_${i}_${j}`, home:grp[i], away:grp[j]});
  return m;
}

// ── Calc ───────────────────────────────────────────────────────────────────────
function recalcStandings() {
  standings.A.forEach(s=>{s.pts=0;s.gf=0;s.ga=0;});
  standings.B.forEach(s=>{s.pts=0;s.gf=0;s.ga=0;});
  ['A','B'].forEach(g => {
    groupMatches[g].forEach(m => {
      const sc = scores[m.id]; if (!sc) return;
      const sh = standings[g].find(x=>x.name===m.home);
      const sa = standings[g].find(x=>x.name===m.away);
      sh.gf+=sc.h; sh.ga+=sc.a; sa.gf+=sc.a; sa.ga+=sc.h;
      if (sc.h>sc.a){sh.pts+=3;} else if(sc.a>sc.h){sa.pts+=3;} else{sh.pts+=1;sa.pts+=1;}
    });
    standings[g].sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));
  });
  buildBrackets();
}

function buildBrackets() {
  const top = g => standings[g][0]?.name||'—';
  const sec = g => standings[g][1]?.name||'—';
  brackets.upper = [
    {id:'U1', home:top('A'), away:top('B'), label:'Upper Semi 1'},
    {id:'U2', home:sec('A'), away:sec('B'), label:'Upper Semi 2'},
  ];
  brackets.lower = [{id:'L1', home:loser('U1')||'—', away:loser('U2')||'—', label:'Lower Semi'}];
  brackets.upperFinal = {id:'UF', home:winner('U1')||'—', away:winner('U2')||'—', label:'Upper Final'};
  brackets.lowerFinal = {id:'LF', home:winner('L1')||'—', away:loser('UF')||'—', label:'Lower Final'};
  brackets.grandFinal = {id:'GF', home:winner('UF')||'—', away:winner('LF')||'—', label:'🏆 Gran Final'};
}

function allMatches() {
  return [...groupMatches.A, ...groupMatches.B,
    ...(brackets.upper||[]), ...(brackets.lower||[]),
    brackets.upperFinal, brackets.lowerFinal, brackets.grandFinal].filter(Boolean);
}
function findMatch(id){ return allMatches().find(m=>m.id===id); }
function winner(id){ const s=scores[id],m=findMatch(id); if(!s||!m) return null; return s.h>s.a?m.home:s.a>s.h?m.away:null; }
function loser(id){ const s=scores[id],m=findMatch(id); if(!s||!m) return null; return s.h>s.a?m.away:s.a>s.h?m.home:null; }

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  buildBrackets();
  document.getElementById('app').innerHTML = renderGroups() + renderBracket();
}

function renderGroups() {
  return `
  <div class="card"><h2>Fase de Grupos</h2><div class="groups">${renderGroup('A')}${renderGroup('B')}</div></div>
  <div class="card"><h2>Partidos — Grupo A</h2><div class="matches">${groupMatches.A.map(renderMatch).join('')}</div></div>
  <div class="card"><h2>Partidos — Grupo B</h2><div class="matches">${groupMatches.B.map(renderMatch).join('')}</div></div>`;
}

function renderGroup(g) {
  const rows = standings[g].map((s,i) => {
    const badge = i===0 ? '<span class="badge q">1°</span>' : i===1 ? '<span class="badge lower">2°</span>' : `${i+1}°`;
    const gd = s.gf-s.ga;
    return `<tr><td>${badge} ${s.name}</td><td>${s.pts}</td><td>${s.gf}</td><td>${s.ga}</td><td>${gd>=0?'+':''}${gd}</td></tr>`;
  }).join('');
  return `<div><div style="font-weight:600;margin-bottom:0.5rem;font-size:0.9rem">Grupo ${g}</div>
  <table class="group-table"><thead><tr><th>Jugador</th><th>Pts</th><th>GF</th><th>GC</th><th>DG</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderMatch(m) {
  const sc = scores[m.id];
  return `<div class="match">
    <div class="teams">
      <span class="team">${m.home}</span>
      <span class="vs">vs</span>
      <span class="team right">${m.away}</span>
    </div>
    <div class="score-inputs">
      <input type="number" id="h_${m.id}" value="${sc?sc.h:''}" min="0" placeholder="-" />
      <span style="color:var(--muted)">:</span>
      <input type="number" id="a_${m.id}" value="${sc?sc.a:''}" min="0" placeholder="-" />
      <button class="save-btn" onclick="saveScore('${m.id}')">✓</button>
    </div>
  </div>`;
}

function renderBracket() {
  const rounds = [
    {label:'Upper Semifinal', matches:[brackets.upper[0], brackets.upper[1]]},
    {label:'Lower Semifinal', matches:[brackets.lower[0]]},
    {label:'Upper Final',     matches:[brackets.upperFinal]},
    {label:'Lower Final',     matches:[brackets.lowerFinal]},
    {label:'🏆 Gran Final',   matches:[brackets.grandFinal]},
  ];
  const html = rounds.map(r =>
    `<div class="round-label">${r.label}</div><div class="matches">${r.matches.filter(Boolean).map(renderMatch).join('')}</div>`
  ).join('');
  return `<div class="card"><h2>Bracket</h2>${html}</div>`;
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = err ? 'var(--red)' : 'var(--accent)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

window.onload = loadAll;
</script>
</body>
</html>
